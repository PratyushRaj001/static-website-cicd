<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My AWS Website</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white;
      padding: 50px 60px;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
      max-width: 600px;
    }
    h1 { color: #1e3a5f; font-size: 2.2em; margin-bottom: 12px; }
    p { color: #64748b; font-size: 1.1em; line-height: 1.6; }
    .badge {
      background: #2563eb; color: white;
      padding: 10px 24px; border-radius: 25px;
      display: inline-block; margin-top: 24px;
      font-size: 0.95em;
    }
    .version { color: #94a3b8; font-size: 0.85em; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>&#x1F680; My Website is Live!</h1>
    <p>This website is automatically deployed using<br>
    <strong>AWS CodePipeline + S3 + Terraform + GitHub</strong></p>
    <div class="badge">&#x2705; CI/CD Pipeline is Working!</div>
    <p class="version">Version 1.0 &mdash; Push code to update automatically</p>
  </div>
</body>
</html>
